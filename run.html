<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paid Learning Platform</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin:0;
}
.container {
  background: #1e293b;
  padding: 25px;
  border-radius: 10px;
  width: 350px;
  text-align: center;
  position: relative; /* make sure inputs are not blocked */
  z-index: 1;
}
input {
  width: 90%;
  padding: 8px;
  margin: 6px;
  z-index: 2; /* ensures input is above other elements */
}
button { padding: 8px 15px; margin-top:5px; cursor:pointer; z-index:2; }
.hidden { display:none; }
</style>
</head>
<body>

<div class="container">

<h2>Premium Learning Platform</h2>

<!-- ACCESS CODE -->
<div id="access">
  <p>Enter your access code:</p>
  <input id="accessCode" placeholder="Your code here" type="text">
  <button id="verifyBtn">Verify Code</button>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
  <h3>Create Account</h3>
  <input id="regEmail" placeholder="Email" type="email">
  <input id="regPass" placeholder="Password" type="password">
  <button id="registerBtn">Register</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
  <h3>Login</h3>
  <input id="loginEmail" placeholder="Email" type="email">
  <input id="loginPass" placeholder="Password" type="password">
  <button id="loginBtn">Login</button>
</div>

<!-- LESSON -->
<div id="lesson" class="hidden">
  <h3>Lesson Content</h3>
  <p>Welcome to your premium learning content! 🎓</p>
  <button id="logoutBtn">Logout</button>
</div>

<p id="message"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// --- Firebase config ---
const firebaseConfig = {
  apiKey: "AIzaSyB7HBdBkQheTQc9Nxhp9oF0Is46r37WdVE",
  authDomain: "josh-50a72.firebaseapp.com",
  projectId: "josh-50a72",
  storageBucket: "josh-50a72.appspot.com",
  messagingSenderId: "1019284292237",
  appId: "1:1019284292237:web:de908caa148f9a5d1598c4"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Valid access codes
const validCodes = ["ACCESS123","ACCESS456"];

// Verify Access Code
document.getElementById("verifyBtn").addEventListener("click", ()=>{
  const code = document.getElementById("accessCode").value.trim();
  if(validCodes.includes(code)){
    document.getElementById("access").classList.add("hidden");
    document.getElementById("register").classList.remove("hidden");
    document.getElementById("message").innerText="";
  } else {
    document.getElementById("message").innerText="Invalid code! Please pay first.";
  }
});

// Register
document.getElementById("registerBtn").addEventListener("click", async ()=>{
  const email = document.getElementById("regEmail").value;
  const pass = document.getElementById("regPass").value;

  if(!email || !pass){ document.getElementById("message").innerText="Enter email and password"; return; }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if(!emailRegex.test(email)){ document.getElementById("message").innerText="Enter a valid email"; return; }

  try{
    const userCredential = await createUserWithEmailAndPassword(auth,email,pass);
    const user = userCredential.user;
    await setDoc(doc(db,"users",user.uid),{ email: email });
    document.getElementById("register").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("message").innerText="Account created! Please login.";
  } catch(error){
    if(error.code==="auth/email-already-in-use"){
      document.getElementById("message").innerText="Email already registered! Please login.";
      document.getElementById("register").classList.add("hidden");
      document.getElementById("login").classList.remove("hidden");
    } else {
      document.getElementById("message").innerText=error.message;
    }
  }
});

// Login
document.getElementById("loginBtn").addEventListener("click", async ()=>{
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPass").value;
  if(!email || !pass){ document.getElementById("message").innerText="Enter email and password"; return; }

  try{
    await signInWithEmailAndPassword(auth,email,pass);
    document.getElementById("login").classList.add("hidden");
    document.getElementById("lesson").classList.remove("hidden");
    document.getElementById("message").innerText="";
  } catch(error){
    document.getElementById("message").innerText="Login failed: "+error.message;
  }
});

// Logout
document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await signOut(auth);
  document.getElementById("lesson").classList.add("hidden");
  document.getElementById("access").classList.remove("hidden");
  document.getElementById("message"]="Logged out";
});
</script>
</body>
</html>
